<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد قصيدة لو كنت قائداً - ماتيا الجليل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-color: #2f4f4f; /* زيتي عريق */
            --secondary-color: #dcae1d; /* ذهبي أوكر للقيادة */
            --accent-color: #0ea5e9; /* أزرق حيوي */
            --text-color: #334155;    
            --bg-pastel: #fdfbf7;     /* خلفية كريمية دافئة */
            --white: #ffffff;
            --emoji-size: 26px;       
            --content-padding: 40px;  
            
            --btn-grad-1: linear-gradient(135deg, #2f4f4f, #1e3a35); 
            --btn-grad-2: linear-gradient(135deg, #dcae1d, #b4860b); 
            --btn-clear-grad: linear-gradient(135deg, #ef4444, #b91c1c);
            --btn-magic-grad: linear-gradient(135deg, #8b5cf6, #d946ef);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #f3f4f6 100%);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .toolbar, .emoji-gallery {
            background-color: var(--white); padding: 15px 25px; border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 15px; 
            align-items: center; margin-bottom: 20px; width: 100%; max-width: 900px; justify-content: center;
        }
        .emoji-gallery { flex-wrap: nowrap; overflow-x: auto; padding: 15px; justify-content: flex-start; scroll-behavior: smooth; }
        
        .toolbar label { font-weight: bold; color: var(--primary-color); font-size: 14px; }
        .toolbar input, .toolbar select {
            border: 2px solid #e2e8f0; border-radius: 8px; padding: 6px 10px;
            font-family: 'Cairo', sans-serif; font-size: 13px; outline: none; transition: 0.2s;
        }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--secondary-color); }

        .emoji-btn {
            width: 48px; height: 48px; background: #f8fafc; border: 3px solid #e2e8f0;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .emoji-btn:hover { transform: scale(1.15) translateY(-2px); border-color: var(--secondary-color); }
        .emoji-btn.active { border-color: var(--secondary-color); background: #fff; transform: scale(1.1); box-shadow: 0 0 12px rgba(220, 174, 29, 0.4);}

        .capture-area {
            background-color: var(--bg-pastel); color: var(--text-color); 
            border-radius: 24px; width: 100%; max-width: 900px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; overflow: hidden; 
            box-sizing: border-box; border: 4px solid #fff; transition: background-color 0.3s;
        }

        .emoji-border-container { position: absolute; display: flex; justify-content: space-between; align-items: center; user-select: none; pointer-events: none; }
        .border-top { top: 12px; left: 15px; right: 15px; height: 35px; flex-direction: row; }
        .border-bottom { bottom: 12px; left: 15px; right: 15px; height: 35px; flex-direction: row; }
        .border-left { top: 50px; bottom: 50px; left: 15px; width: 35px; flex-direction: column; }
        .border-right { top: 50px; bottom: 50px; right: 15px; width: 35px; flex-direction: column; }
        .emoji-item { font-size: var(--emoji-size); line-height: 1; transition: 0.2s; }

        .worksheet-content { padding: var(--content-padding); box-sizing: border-box; width: 100%; }

        .header-banner {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: var(--white);
            padding: 25px; border-radius: 18px; text-align: center; margin-bottom: 25px; box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }
        .header-banner h1 { margin: 0; font-size: 34px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header-banner p { margin: 10px 0 0 0; font-size: 16px; font-weight: bold; }

        .stanza-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 18px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid #e2e8f0; position: relative;
        }
        
        .role-selector {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px;
            background: #fff; padding: 15px; border-radius: 15px; border: 2px dashed var(--secondary-color);
        }
        .role-selector select { font-size: 18px; padding: 8px 15px; border-color: var(--primary-color); font-weight: bold; color: var(--primary-color);}

        .input-row { display: flex; align-items: center; margin-bottom: 15px; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
        .input-row:last-child { border-bottom: none; }
        .input-label { width: 30%; font-size: 17px; font-weight: bold; color: var(--primary-color); display: flex; align-items: center; gap: 8px; }
        
        .input-field-group { flex: 1; display: flex; gap: 10px; align-items: center; }
        .text-input {
            flex: 1; padding: 12px 15px; border: 2px solid #cbd5e1; border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 15px; background: #f8fafc; transition: 0.3s;
        }
        .text-input:focus { border-color: var(--secondary-color); outline: none; background: #fff; box-shadow: 0 0 10px rgba(220, 174, 29, 0.2); }

        .mic-btn {
            background: #fdfbf7; border: 2px solid var(--secondary-color); border-radius: 12px;
            cursor: pointer; font-size: 20px; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0;
        }
        .mic-btn:hover { background: #fef3c7; transform: scale(1.05); }
        .mic-btn.recording { background: #fee2e2; border-color: #fca5a5; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }

        .buttons-container { display: flex; gap: 15px; margin-top: 30px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 900px;}
        .btn { font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: bold; padding: 14px 25px; border: none; border-radius: 12px; cursor: pointer; color: var(--white); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-story { background: var(--btn-grad-1); }
        .btn-download { background: var(--btn-grad-2); }
        .btn-magic { background: var(--btn-magic-grad); }
        .btn-clear { background: var(--btn-clear-grad); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; padding: 30px; border-radius: 24px; max-width: 700px; width: 90%; position: relative; text-align: center; box-shadow: 0 20px 45px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;}
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 32px; font-weight: bold; cursor: pointer; color: #94a3b8; transition: 0.2s;}
        
        .result-card {
            background-color: var(--bg-pastel); border: 6px double var(--primary-color); padding: 40px 30px; 
            border-radius: 20px; margin-top: 15px; position: relative; overflow: hidden; text-align: center;
        }
        
        .result-title { color: var(--primary-color); font-family: 'Cairo', sans-serif; margin-top: 0; margin-bottom: 5px; font-size: 36px; font-weight: 900;}
        .author-name { font-size: 18px; color: var(--secondary-color); font-weight: bold; margin-bottom: 30px; }

        .stanza-display { font-size: 22px; line-height: 2.2; color: var(--text-color); margin-bottom: 25px; font-weight: bold; }
        .highlight-word { color: var(--primary-color); border-bottom: 2px solid var(--secondary-color); padding: 0 5px;}

        /* تنسيق قصة الذكاء الاصطناعي */
        .ai-story-display { font-size: 19px; line-height: 2; text-align: right; background: #fff; padding: 25px; border-radius: 15px; border: 1px dashed var(--secondary-color); }

        @media (max-width: 768px) {
            .input-row { flex-direction: column; align-items: stretch; gap: 8px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;}
            .input-label { width: 100%; flex-direction: row; align-items: center; gap: 8px;}
            .worksheet-content { padding: 30px 15px; }
            .stanza-display { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="emoji-gallery">
        <div class="emoji-btn active" onclick="selectEmojiBorder('none', this)" title="بدون إطار">❌</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('👑', this)">👑</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('🌍', this)">🌍</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('🤝', this)">🤝</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('💡', this)">💡</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('🕊️', this)">🕊️</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('⭐', this)">⭐</div>
        <div class="emoji-btn" onclick="selectEmojiBorder('🏫', this)">🏫</div>
    </div>

    <div class="toolbar">
        <label>لون الخلفية:</label> <input type="color" id="bgColor" value="#fdfbf7">
        <label>لون النص:</label> <input type="color" id="textColor" value="#334155">
        <label>نوع الخط:</label>
        <select id="fontStyle">
            <option value="'Cairo', sans-serif">Cairo</option>
            <option value="'Tahoma', sans-serif">Tahoma</option>
        </select>
        <label>حجم الإطار:</label> <input type="range" id="emojiSizeInput" min="16" max="36" value="26">
    </div>

    <div id="captureArea" class="capture-area">
        <div class="emoji-border-container border-top" id="borderTop"></div>
        <div class="emoji-border-container border-bottom" id="borderBottom"></div>
        <div class="emoji-border-container border-left" id="borderLeft"></div>
        <div class="emoji-border-container border-right" id="borderRight"></div>

        <div class="worksheet-content">
            <div class="header-banner">
                <h1>أحلام القيادة 👑</h1>
                <p>عبر عن أفكارك العظيمة وكيف ستجعل العالم مكاناً أفضل!</p>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--primary-color); font-size: 18px;">اسم القائد / القائدة:</label><br>
                <input type="text" id="authorName" class="text-input required-field" placeholder="اكتب اسمك هنا..." style="width: 60%; max-width: 400px; text-align: center; font-size: 18px; margin-top: 10px; border-color: var(--secondary-color);">
            </div>

            <div class="role-selector">
                <label style="font-size: 20px; font-weight: bold;">لو كنتُ يوماً...</label>
                <select id="leaderRole">
                    <option value="رئيساً">رئيساً</option>
                    <option value="قائداً">قائداً</option>
                    <option value="مديراً">مديراً</option>
                    <option value="معلماً">معلماً</option>
                </select>
            </div>

            <div class="stanza-card">
                <div class="input-row">
                    <div class="input-label">سأساعد..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_help" placeholder="مثال: الفقراء والمحتاجين">
                        <button class="mic-btn" onclick="startDictation('i_help', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأصنع..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_make" placeholder="مثال: حدائق جميلة للعب">
                        <button class="mic-btn" onclick="startDictation('i_make', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأبدأ بـ..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_start" placeholder="مثال: زراعة الأشجار في كل مكان">
                        <button class="mic-btn" onclick="startDictation('i_start', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأعطي..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_give" placeholder="مثال: فرصة للجميع للتعلم">
                        <button class="mic-btn" onclick="startDictation('i_give', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأوقف..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_stop" placeholder="مثال: التنمر والأذى">
                        <button class="mic-btn" onclick="startDictation('i_stop', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأستمع إلى..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_listen" placeholder="مثال: آراء الأطفال وأفكارهم">
                        <button class="mic-btn" onclick="startDictation('i_listen', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأفكر في..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_think" placeholder="مثال: حلول لحماية البيئة">
                        <button class="mic-btn" onclick="startDictation('i_think', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأقلل من..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_reduce" placeholder="مثال: التلوث في المدن">
                        <button class="mic-btn" onclick="startDictation('i_reduce', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأزيد من..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_increase" placeholder="مثال: المحبة والسلام بين الناس">
                        <button class="mic-btn" onclick="startDictation('i_increase', this)">🎙️</button>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-label">سأكون..</div>
                    <div class="input-field-group">
                        <input type="text" class="text-input required-field" id="i_be" placeholder="مثال: شخصاً عادلاً وطيباً">
                        <button class="mic-btn" onclick="startDictation('i_be', this)">🎙️</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="buttons-container">
        <button class="btn btn-story" onclick="generatePoem()">📜 إصدار القصيدة</button>
        <button class="btn btn-magic" onclick="generateMagicStory()">✨ تأليف قصة ذكية (AI)</button>
        <button class="btn btn-download" onclick="downloadPage()">📸 تحميل فارغة</button>
        <button class="btn btn-clear" onclick="clearAll()">🧹 مسح الكل</button>
    </div>

    <!-- نافذة القصيدة النهائية (Modal) -->
    <div id="poemModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div id="resultCaptureArea" class="result-card">
                <div class="emoji-border-container border-top" id="resBorderTop" style="top: 8px;"></div>
                <div class="emoji-border-container border-bottom" id="resBorderBottom" style="bottom: 8px;"></div>
                <div class="emoji-border-container border-left" id="resBorderLeft" style="top: 35px; bottom: 35px; left: 10px;"></div>
                <div class="emoji-border-container border-right" id="resBorderRight" style="top: 35px; bottom: 35px; right: 10px;"></div>

                <h2 class="result-title" id="displayTitle">لو كنتُ...</h2>
                <div class="author-name" id="displayAuthorName">بقلم: </div>
                
                <div id="poemContentContainer">
                    <div class="stanza-display">
                        سأساعد <span class="highlight-word" id="out_help"></span><br>
                        سأصنع <span class="highlight-word" id="out_make"></span><br>
                        سأبدأ بـ <span class="highlight-word" id="out_start"></span><br>
                        سأعطي <span class="highlight-word" id="out_give"></span><br>
                        سأوقف <span class="highlight-word" id="out_stop"></span><br>
                        سأستمع إلى <span class="highlight-word" id="out_listen"></span><br>
                        سأفكر في <span class="highlight-word" id="out_think"></span><br>
                        سأقلل من <span class="highlight-word" id="out_reduce"></span><br>
                        سأزيد من <span class="highlight-word" id="out_increase"></span><br>
                        سأكون <span class="highlight-word" id="out_be"></span>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; justify-content: center; margin-top: 20px; gap: 15px;">
                <button class="btn btn-story" onclick="downloadResult()">📸 حفظ كصورة</button>
            </div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        let activeEmoji = 'none';

        function renderEmojiBorder() {
            const containers = [
                { top: 'borderTop', bottom: 'borderBottom', left: 'borderLeft', right: 'borderRight', area: document.getElementById('captureArea'), scale: 30 },
                { top: 'resBorderTop', bottom: 'resBorderBottom', left: 'resBorderLeft', right: 'resBorderRight', area: document.getElementById('resultCaptureArea'), scale: 16 }
            ];

            containers.forEach(c => {
                document.getElementById(c.top).innerHTML = ''; document.getElementById(c.bottom).innerHTML = '';
                document.getElementById(c.left).innerHTML = ''; document.getElementById(c.right).innerHTML = '';

                if (activeEmoji === 'none') return;
                const emojiSize = parseInt(getComputedStyle(root).getPropertyValue('--emoji-size')) || 26;
                const spacing = emojiSize + 10; 
                const cols = Math.floor((c.area.offsetWidth - c.scale) / spacing); const rows = Math.floor((c.area.offsetHeight - (c.scale * 2)) / spacing);

                for (let i = 0; i < cols; i++) {
                    document.getElementById(c.top).innerHTML += `<span class="emoji-item">${activeEmoji}</span>`; document.getElementById(c.bottom).innerHTML += `<span class="emoji-item">${activeEmoji}</span>`;
                }
                for (let i = 0; i < rows; i++) {
                    document.getElementById(c.left).innerHTML += `<span class="emoji-item">${activeEmoji}</span>`; document.getElementById(c.right).innerHTML += `<span class="emoji-item">${activeEmoji}</span>`;
                }
            });
        }

        function selectEmojiBorder(emoji, element) {
            document.querySelectorAll('.emoji-gallery .emoji-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active'); activeEmoji = emoji; renderEmojiBorder();
        }

        window.addEventListener('resize', renderEmojiBorder);
        
        document.getElementById('bgColor').addEventListener('input', e => root.style.setProperty('--bg-pastel', e.target.value));
        document.getElementById('textColor').addEventListener('input', e => root.style.setProperty('--text-color', e.target.value));
        document.getElementById('fontStyle').addEventListener('change', e => { 
            document.getElementById('captureArea').style.fontFamily = e.target.value; 
            document.getElementById('resultCaptureArea').style.fontFamily = e.target.value; 
        });
        document.getElementById('emojiSizeInput').addEventListener('input', e => { root.style.setProperty('--emoji-size', e.target.value + 'px'); renderEmojiBorder(); });

        const scriptUrl = "ضعي_رابط_سكربت_جوجل_هنا"; // انسخي الرابط السري الطويل من Google Apps Script وضعيه هنا

        async function callGeminiAPI(prompt) {
            let retries = 3; let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    // الآن نقوم بالاتصال بالوسيط السري بدلاً من الاتصال المباشر والمكشوف
                    const response = await fetch(scriptUrl, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // تقنية لتجنب مشاكل الأمان للمتصفحات
                        body: JSON.stringify({ prompt: prompt }) 
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const result = await response.json();
                    
                    if(result.success) {
                        return result.text;
                    } else {
                        console.error("خطأ من الوسيط:", result.error);
                        throw new Error(result.error);
                    }
                } catch (error) {
                    if (i === retries - 1) return "حدث خطأ في الاتصال بالذكاء الاصطناعي. الرجاء المحاولة لاحقاً.";
                    await new Promise(res => setTimeout(res, delay)); delay *= 2;
                }
            }
        }

        function checkCompletion() {
            let isComplete = true;
            document.querySelectorAll('.required-field').forEach(input => { if(input.value.trim() === '') isComplete = false; });
            if(!isComplete) Swal.fire('أكمل الإبداع!', 'يرجى ملء جميع الفراغات لنتمكن من إصدار لوحتك.', 'warning');
            return isComplete;
        }

        function generatePoem() {
            if(!checkCompletion()) return;

            const role = document.getElementById('leaderRole').value;
            document.getElementById('displayTitle').innerText = `لو كنتُ ${role}`;
            document.getElementById('displayAuthorName').innerText = `بقلم القائد: ${document.getElementById('authorName').value}`;
            
            // استعادة عرض القصيدة الافتراضية وإخفاء قصة الـ AI إن وجدت
            document.getElementById('poemContentContainer').innerHTML = `
                <div class="stanza-display">
                    سأساعد <span class="highlight-word">${document.getElementById('i_help').value}</span><br>
                    سأصنع <span class="highlight-word">${document.getElementById('i_make').value}</span><br>
                    سأبدأ بـ <span class="highlight-word">${document.getElementById('i_start').value}</span><br>
                    سأعطي <span class="highlight-word">${document.getElementById('i_give').value}</span><br>
                    سأوقف <span class="highlight-word">${document.getElementById('i_stop').value}</span><br>
                    سأستمع إلى <span class="highlight-word">${document.getElementById('i_listen').value}</span><br>
                    سأفكر في <span class="highlight-word">${document.getElementById('i_think').value}</span><br>
                    سأقلل من <span class="highlight-word">${document.getElementById('i_reduce').value}</span><br>
                    سأزيد من <span class="highlight-word">${document.getElementById('i_increase').value}</span><br>
                    سأكون <span class="highlight-word">${document.getElementById('i_be').value}</span>
                </div>
            `;
            
            document.getElementById('poemModal').style.display = 'flex';
            setTimeout(renderEmojiBorder, 50);
        }

        async function generateMagicStory() {
            if(!checkCompletion()) return;

            const role = document.getElementById('leaderRole').value;
            const name = document.getElementById('authorName').value;
            
            Swal.fire({ title: '✨ جاري استشارة مستشاريك...', html: 'الذكاء الاصطناعي يكتب خطابك القيادي المذهل...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const promptText = `
            أنت كاتب خطابات وقصص ملهمة للأطفال. قم بكتابة خطاب/قصة قصيرة ومحفزة باللغة العربية بلسان الطفل "${name}" الذي يتخيل نفسه "${role}".
            اعتمد على أفكاره التالية:
            سيساعد: ${document.getElementById('i_help').value}
            سيصنع: ${document.getElementById('i_make').value}
            سيبدأ بـ: ${document.getElementById('i_start').value}
            سيعطي: ${document.getElementById('i_give').value}
            سيوقف: ${document.getElementById('i_stop').value}
            سيستمع إلى: ${document.getElementById('i_listen').value}
            سيفكر في: ${document.getElementById('i_think').value}
            سيقلل من: ${document.getElementById('i_reduce').value}
            سيزيد من: ${document.getElementById('i_increase').value}
            سيكون: ${document.getElementById('i_be').value}

            شروط: لغة عربية فصحى مبهجة للأطفال، لا تتجاوز 3 فقرات، استخدم رموز تعبيرية (emojis)، ابدأ الخطاب بترحيب حماسي.
            `;

            const aiResponse = await callGeminiAPI(promptText);
            Swal.close();

            document.getElementById('displayTitle').innerText = `خطاب الـ${role.replace('اً', '')}: ${name}`;
            document.getElementById('displayAuthorName').innerText = `رؤية مستقبلية من إبداعك`;
            
            let formattedStory = aiResponse.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('poemContentContainer').innerHTML = `<div class="ai-story-display">${formattedStory}</div>`;
            
            document.getElementById('poemModal').style.display = 'flex';
            setTimeout(renderEmojiBorder, 50);
        }

        function closeModal() { document.getElementById('poemModal').style.display = 'none'; }

        function startDictation(inputId, btn) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { Swal.fire('عذراً!', 'متصفحك لا يدعم الإملاء الصوتي.', 'error'); return; }
            const recognition = new SpeechRecognition(); recognition.lang = 'ar-SA'; recognition.interimResults = false;
            
            recognition.onstart = function() { btn.classList.add('recording'); };
            recognition.onresult = function(event) {
                const input = document.getElementById(inputId);
                input.value = input.value.trim() !== '' ? input.value + ' ' + event.results[0][0].transcript : event.results[0][0].transcript;
            };
            recognition.onend = function() { btn.classList.remove('recording'); };
            recognition.onerror = function() { btn.classList.remove('recording'); };
            try { recognition.start(); } catch (err) {}
        }

        function downloadPage() { html2canvas(document.getElementById('captureArea'), { scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = 'ورقة_القيادة.png'; link.href = canvas.toDataURL(); link.click(); }); }
        function downloadResult() { html2canvas(document.getElementById('resultCaptureArea'), { scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = 'بطاقة_القيادة.png'; link.href = canvas.toDataURL(); link.click(); }); }
        function clearAll() { document.querySelectorAll('.required-field').forEach(input => input.value = ''); Swal.fire('تم المسح! ✨', 'الورقة جاهزة لرؤية جديدة.', 'success'); }
    </script>
</body>
